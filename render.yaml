services:
  - type: web
    name: clarityxo-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: clarityxo
      - key: MONGODB_COLLECTION
        value: leaderboard_months
      - key: CORS_ORIGIN
        sync: false